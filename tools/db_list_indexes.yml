type: function
name: db_list_indexes
label: 索引列表
description: |
  List indexes in a schema, optionally limited to one table.
inputSchema:
  type: object
  properties:
    connection_name:
      type: string
      description: Configured connection name.
    schema:
      type: string
      description: Schema name. Defaults to the driver's default schema.
    table:
      type: string
      description: Optional table name.
  required:
    - connection_name
  additionalProperties: false
