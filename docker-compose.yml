services:
  mcp-server-database:
    image: mcp-server-database
    container_name: mcp-server-database
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      MCP_TOOLS_SPEC_LOCATION_PATTERN: "./tools/*.yml"
      DB_CONNECTIONS_CONFIG_PATH: "./configs"
    ports:
      - "${HOST_PORT:-11968}:${SERVER_PORT:-8080}"
    volumes:
      - ./configs:/app/configs
      - ./tmp:/app/tmp
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: mcp-server-database-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: change_me
      MYSQL_DATABASE: mcp_demo
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -pchange_me --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql

  postgres:
    image: postgres:17-alpine
    container_name: mcp-server-database-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: mcp_demo
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp_demo"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  mysql-data:
  postgres-data:
